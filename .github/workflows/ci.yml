name: next-js-project-CI

on: push

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: pnpm Install

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Build Application
        run: pnpm run build